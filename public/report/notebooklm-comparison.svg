<svg width="960" height="540" viewBox="0 0 960 540" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AtlasLM compared with NotebookLM</title>
  <desc id="desc">A comparison chart showing grounded RAG, retrieval controls, memory visibility, deployment ownership, and research mode.</desc>
  <rect width="960" height="540" rx="20" fill="#F4F7F6"/>
  <rect x="28" y="28" width="904" height="484" rx="14" fill="#FFFFFF" stroke="#D6DFDA"/>
  <text x="58" y="82" fill="#17211D" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">Why AtlasLM over NotebookLM?</text>
  <text x="60" y="116" fill="#63716B" font-family="Inter, Arial, sans-serif" font-size="16">Built for assignment proof: inspectable retrieval, deployable code, and research-grade hooks.</text>

  <g transform="translate(58 156)">
    <rect width="400" height="270" rx="10" fill="#EDF4F1" stroke="#C9D8D1"/>
    <text x="24" y="42" fill="#17211D" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">NotebookLM</text>
    <g fill="#63716B" font-family="Inter, Arial, sans-serif" font-size="16">
      <text x="24" y="86">Closed retrieval internals</text>
      <text x="24" y="126">Limited vector database control</text>
      <text x="24" y="166">Great UX, weaker code proof</text>
      <text x="24" y="206">No assignment-ready GitHub pipeline</text>
    </g>
    <circle cx="334" cy="72" r="32" fill="#FFFFFF" stroke="#D6DFDA"/>
    <path d="M318 72h32M334 56v32" stroke="#BF4F3C" stroke-width="7" stroke-linecap="round"/>
  </g>

  <g transform="translate(502 156)">
    <rect width="400" height="270" rx="10" fill="#17211D"/>
    <text x="24" y="42" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">AtlasLM</text>
    <g font-family="Inter, Arial, sans-serif" font-size="16">
      <text x="24" y="86" fill="#DDEBE5">Hybrid dense + BM25 retrieval</text>
      <text x="24" y="126" fill="#DDEBE5">Qdrant vector database</text>
      <text x="24" y="166" fill="#DDEBE5">Every answer shows cited chunks</text>
      <text x="24" y="206" fill="#DDEBE5">TurboQuant lab and memory estimates</text>
    </g>
    <circle cx="334" cy="72" r="32" fill="#0B7A5C"/>
    <path d="M318 74l12 12 24-31" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(84 456)">
    <rect width="164" height="18" rx="9" fill="#0B7A5C"/>
    <text x="0" y="-12" fill="#17211D" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Grounding</text>
  </g>
  <g transform="translate(284 456)">
    <rect width="142" height="18" rx="9" fill="#6F57C9"/>
    <text x="0" y="-12" fill="#17211D" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Control</text>
  </g>
  <g transform="translate(466 456)">
    <rect width="190" height="18" rx="9" fill="#C8861A"/>
    <text x="0" y="-12" fill="#17211D" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Deployability</text>
  </g>
  <g transform="translate(696 456)">
    <rect width="126" height="18" rx="9" fill="#BF4F3C"/>
    <text x="0" y="-12" fill="#17211D" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Research</text>
  </g>
</svg>
