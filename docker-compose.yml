services:
  qdrant:
    image: qdrant/qdrant:v1.18.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - atlaslm-qdrant:/qdrant/storage
    restart: unless-stopped

  atlaslm:
    build: .
    env_file:
      - .env.local
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ""
      QDRANT_TURBOQUANT: "true"
      APP_URL: http://localhost:${ATLASLM_PORT:-3002}
    depends_on:
      - qdrant
    ports:
      - "${ATLASLM_PORT:-3002}:3000"
    restart: unless-stopped

volumes:
  atlaslm-qdrant:
